compatibility_date = "2025-05-01"

routes = [
  { pattern = "flujobox.com", custom_domain = true },
  { pattern = "www.flujobox.com", custom_domain = true },
]

[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "single-page-application"

[[d1_databases]]
binding = "LEADS_DB"
database_name = "flujobox-leads"
database_id = "d012dfc8-1ab4-46a4-94df-b1c54a9bcf07"
